<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyric Love SVG Collection</title>

<link rel="stylesheet" href="style.css">

<style>
body{
background:#000;
font-family:Arial,sans-serif;
color:#fff;
margin:0;
}

.header{
text-align:center;
padding:40px 20px;
}

.header h1{
font-size:42px;
color:#ff2ea6;
margin-bottom:10px;
}

.header p{
color:#ccc;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
padding:30px;
}

.card{
background:#111;
border:2px solid #ff2ea6;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 20px #ff2ea655;
}

.card img{
width:100%;
display:block;
}

.info{
padding:20px;
}

.info h2{
color:#00e5ff;
margin:0;
}

.price{
font-size:24px;
font-weight:bold;
color:#ff2ea6;
margin:10px 0;
}

button{
background:#ff2ea6;
color:white;
border:none;
padding:12px 25px;
border-radius:30px;
font-size:16px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="header">
<h1>Custom SVG Designs</h1>
<p>Instant Digital Downloads • Commercial License Available</p>
</div>

<div class="grid">

<div class="card">
<img src="IMG_7901.jpeg">
<div class="info">
<h2>Funny Relationship SVG #1</h2>
<div class="price">$5</div>
<button>Purchase</button>
</div>
</div>

<div class="card">
<img src="IMG_7903.jpeg">
<div class="info">
<h2>Funny Relationship SVG #2</h2>
<div class="price">$5</div>
<button>Purchase</button>
</div>
</div>

<div class="card">
<img src="IMG_7904.jpeg">
<div class="info">
<h2>Funny Relationship SVG #3</h2>
<div class="price">$5</div>
<button>Purchase</button>
</div>
</div>

<div class="card">
<img src="IMG_7905.jpeg">
<div class="info">
<h2>Funny Relationship SVG #4</h2>
<div class="price">$5</div>
<button>Purchase</button>
</div>
</div>

<div class="card">
<img src="IMG_7906.jpeg">
<div class="info">
<h2>Funny Relationship SVG #5</h2>
<div class="price">$5</div>
<button>Purchase</button>
</div>
</div>

</div>

</body>
</html>
